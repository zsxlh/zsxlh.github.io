<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机选择器</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #random-choice {
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>随机选择器</h1>
  <p>点击下面的按钮，从选项中随机选择一个：</p>
  <button onclick="chooseRandomOption()">随机选择</button>
  <p id="random-choice"></p>

  <script>
    const options = ["选项1", "选项2", "选项3", "选项4"];

    function chooseRandomOption() {
      const randomIndex = Math.floor(Math.random() * options.length);
      const randomChoice = options[randomIndex];
      document.getElementById("random-choice").innerText = "随机选择的选项是：" + randomChoice;
    }
  </script>
</body>
</html>
