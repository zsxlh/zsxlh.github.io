<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古文选项网站</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
    </style>
</head>
<body>
    <h1>古文选项网站</h1>
    <p>这里是古文内容。</p>
    <form action="{{ url_for('submit') }}" method="POST">
        <div>
            <label for="user_name">输入您的名字：</label>
            <input type="text" id="user_name" name="user_name">
        </div>
        <div>
            <label for="selected_option">选择一个选项：</label>
            <select id="selected_option" name="selected_option">
                <option value="1">选项 1</option>
                <option value="2">选项 2</option>
                <option value="3">选项 3</option>
                <option value="4">选项 4</option>
                <option value="5">选项 5</option>
            </select>
        </div>
        <button type="submit">提交选择</button>
    </form>
    <form action="{{ url_for('random_assign') }}" method="POST">
        <div>
            <label for="user_name">输入您的名字：</label>
            <input type="text" id="user_name" name="user_name">
        </div>
        <button type="submit">随机分配</button>
    </form>
    <a href="{{ url_for('view_choices') }}">查看所有用户选择</a>
    <script>
        function showMessage(message) {
            alert(message);
        }
    </script>
</body>
</html>
